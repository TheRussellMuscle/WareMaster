# Wares Blade Word-Casting Techniques: Gate of Water
# Source: Playkit p. 47

discipline: word-casting
gate: water
gate_description: "A Gate representing water. Students of this gate carry water everywhere they go to use as a catalyst."
techniques:
  - id: mistcall-mistclear
    name: "Mistcall / Mistclear"
    romanization: "RIE-MU / RIE-HI"
    source: "Playkit p. 47"
    gate: water
    level: 1
    segments_required: 2
    requisites: null
    effect: "Creates fog around the caster / Removes fog around the caster"
    range: "0"
    target: "1 liet (4m) radius around caster"
    duration: "Until fog dissipates or is removed"
    save: null
    description: |
      The fog generated by this Technique halves the caster's visibility but increases their
      DN by 2 against Ranged attacks. Conversely, their BN is reduced by 2. Unless there are
      strong winds in the area, the fog will disperse naturally within 2 Turns (ca. 10 minutes).

  - id: frostbind
    name: Frostbind
    romanization: RIE-TANGU
    source: "Playkit p. 47"
    gate: water
    level: 1
    segments_required: 2
    requisites: "Must touch target"
    effect: "Rapidly drains heat from water and objects containing water"
    range: "0"
    target: "5-litre (20cm) cube of water"
    duration: Instant
    save: null
    description: |
      Any water or similar liquid within the area of effect will be completely frozen. Creatures
      whose body contains water will suffer 1D5+1 Physical damage.

  - id: scatterdrops
    name: Scatterdrops
    romanization: RIE-VAM
    source: "Playkit p. 47"
    gate: water
    level: 1
    segments_required: 1
    requisites: "Caster must have enough water to wet their palm"
    effect: "Shoots globes of water from the caster's palm"
    range: "3 liets (12m)"
    target: "1 person"
    duration: Instant
    save: "AGI 12"
    description: |
      Globes of water are fired at high speeds from the caster's palm. Unless the target makes
      a successful save, they are blinded for 1D5 Segments and suffer a -3 modifier to all
      Action Rolls except LUC Rolls.
