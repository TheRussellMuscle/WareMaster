# Wares Blade weapons + ammunition
# Source: Playkit Chapter 3 (p. 18)
#
# Damage Value notation: dice formulas as strings ("1D10", "2D5+5", etc.).
# bn_modifier: { melee, charge, range }; null = cannot use that attack type.

weapons:
  # DAGGERS
  - id: dagger
    name: Dagger
    source: "Playkit p. 18"
    category: daggers
    hands: 1
    critical_value: 8
    bn_modifier: { melee: 3, charge: 0, range: 1 }
    damage_value: { melee: "1D5-1", ranged: "1D5-2" }
    price_golda: 10
  - id: throwing-dagger
    name: "Throwing Dagger"
    source: "Playkit p. 18"
    category: daggers
    hands: 1
    critical_value: 8
    bn_modifier: { melee: -3, charge: -4, range: 3 }
    damage_value: { melee: "1D5-2", ranged: "1D5-2" }
    price_golda: 5

