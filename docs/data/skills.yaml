    attribute: AGI
    source: "Playkit p. 16, p. 18"
  - id: bastard-sword
    name: "Bastard Sword"
    category: combat
    attribute: AGI
    source: "Playkit p. 16, p. 18"
    notes: "Bastard Sword can be wielded 1H or 2H; the Skill applies to either grip."
  - id: greatsword
