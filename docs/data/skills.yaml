# Wares Blade Skills
# Source: Playkit Chapter 3 (p. 16)
# Each Skill has a governing Ability and category. Specialized Skills have no Ability.

skills:
  # COMBAT
  # Each weapon type is its own Skill in Wares Blade — there is no generic
  # "weapon" Skill. Skill-package entries written as "Weapon*" or
  # "Weapon/One Type" are placeholders the player resolves at character
  # creation by allocating the package level across one or more specific
  # weapons (e.g. Longsword Lv 2, OR Longsword Lv 1 + Dagger Lv 1).
  # Source: Playkit p. 16, Chapters 5 + 8.
  - id: dagger
    name: Dagger
    category: combat
    attribute: AGI
    source: "Playkit p. 16, p. 18"
  - id: throwing-dagger
    name: "Throwing Dagger"
    category: combat
    attribute: AGI
    source: "Playkit p. 16, p. 18"
